<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="55%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="16" cy="16" r="12">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#7c3aed" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Card -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#0a0a0f"/>
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#glow)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="none" stroke="url(#g)" stroke-opacity="0.45" stroke-width="1"/>
  <!-- Hub ring -->
  <circle cx="16" cy="16" r="8" stroke="url(#g)" stroke-width="2.8" fill="none"/>
  <!-- Inner accent dot -->
  <circle cx="16" cy="16" r="1.6" fill="#0ea5e9"/>
  <!-- Orientation marker (top-right corner of die) -->
  <circle cx="23" cy="9" r="1.2" fill="#f59e0b"/>
</svg>
